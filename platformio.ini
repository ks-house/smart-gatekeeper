; ============================================================
; smart-gatekeeper — PlatformIO Project Configuration
; MCU: ESP32-C6-DevKitC-1 (RISC-V, Wi-Fi 6, BLE 5.3)
; Framework: Arduino via pioarduino (공식 espressif32는 C6 미지원)
; Step 1: Local PoC (ToF + Relay standalone tests)
; ============================================================
; ⚠️ 출처: raw/Espressif_ESP32C6_BoardSpec.md
; ============================================================

[platformio]
default_envs = esp32c6

; ─────────────────────────────────────────────────────────────
; 공통 설정 (모든 env가 상속)
; ─────────────────────────────────────────────────────────────
[common]
; pioarduino: 공식 espressif32 대신 커뮤니티 fork 사용
; (ESP32-C6 Arduino 3.x 코어 지원)
platform      = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board         = esp32-c6-devkitc-1
framework     = arduino
monitor_speed = 115200
build_flags   =
    -DCORE_DEBUG_LEVEL=3
    -Wall
    ; ESP32-C6 Native USB CDC 활성화 (없으면 시리얼 모니터 안 열림)
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps      =
    pololu/VL53L0X @ ^1.3.1

; ─────────────────────────────────────────────────────────────
; 기본 환경 (통합 빌드)
; ─────────────────────────────────────────────────────────────
[env:esp32c6]
platform      = ${common.platform}
board         = ${common.board}
framework     = ${common.framework}
monitor_speed = ${common.monitor_speed}
build_flags   = ${common.build_flags}
lib_deps      = ${common.lib_deps}

; ─────────────────────────────────────────────────────────────
; ToF 단독 테스트 환경
; ─────────────────────────────────────────────────────────────
[env:tof_test]
platform      = ${common.platform}
board         = ${common.board}
framework     = ${common.framework}
monitor_speed = ${common.monitor_speed}
build_flags   =
    ${common.build_flags}
    -DTEST_TOF_ONLY
lib_deps      = ${common.lib_deps}

; ─────────────────────────────────────────────────────────────
; 릴레이 단독 테스트 환경
; ─────────────────────────────────────────────────────────────
[env:relay_test]
platform      = ${common.platform}
board         = ${common.board}
framework     = ${common.framework}
monitor_speed = ${common.monitor_speed}
build_flags   =
    ${common.build_flags}
    -DTEST_RELAY_ONLY
lib_deps      = ${common.lib_deps}
